<style>
        body {
            background-color: #051424;
            color: #d4e4fa;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 10px 30px -5px rgba(99, 102, 241, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- Top Navigation Anchor -->
<header class="bg-surface/60 backdrop-blur-md text-primary font-headline-md text-headline-md docked full-width top-0 border-b border-white/10 shadow-[0px_10px_30px_-5px_rgba(99,102,241,0.2)] flex justify-between items-center w-full px-margin-desktop h-16 z-50">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="account_tree">account_tree</span>
<span class="font-display text-headline-md text-primary tracking-tight">System Lab</span>
</div>
<div class="flex gap-lg items-center">
<nav class="hidden md:flex gap-md">
<span class="text-on-surface-variant font-label-caps text-label-caps hover:bg-white/5 transition-all duration-250 ease-in-out px-sm py-xs rounded cursor-pointer">Simulation</span>
<span class="text-secondary font-bold font-label-caps text-label-caps hover:bg-white/5 transition-all duration-250 ease-in-out px-sm py-xs rounded cursor-pointer">Topology</span>
<span class="text-on-surface-variant font-label-caps text-label-caps hover:bg-white/5 transition-all duration-250 ease-in-out px-sm py-xs rounded cursor-pointer">Logs</span>
</nav>
<span class="material-symbols-outlined cursor-pointer hover:bg-white/5 p-xs rounded-full transition-all duration-250" data-icon="settings">settings</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center relative overflow-hidden px-margin-mobile md:px-0">
<!-- Subtle Indigo Glow Background -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Single Replica Glassmorphic Card -->
<div class="glass-card w-full max-w-sm rounded-xl overflow-hidden relative group">
<!-- Light source highlight -->
<div class="absolute top-0 left-0 right-0 h-px bg-white/20"></div>
<div class="p-lg">
<!-- Header Section -->
<div class="flex justify-between items-center mb-xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary scale-75" data-icon="hub">hub</span>
<h2 class="font-headline-md text-headline-md text-on-surface tracking-tight">Replica A</h2>
</div>
<div class="flex items-center gap-xs bg-surface-container-high/50 px-sm py-1 rounded-full border border-white/5">
<span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_rgba(93,230,255,0.6)]"></span>
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-wider">Consistente</span>
</div>
</div>
<!-- Variable List Section -->
<div class="space-y-md">
<div class="flex items-center justify-between p-md bg-white/5 rounded-lg border border-white/5 hover:border-primary/30 transition-colors duration-250">
<span class="font-code-md text-code-md text-primary">x</span>
<span class="font-code-md text-code-md text-on-surface">0</span>
</div>
<div class="flex items-center justify-between p-md bg-white/5 rounded-lg border border-white/5 hover:border-primary/30 transition-colors duration-250">
<span class="font-code-md text-code-md text-primary">y</span>
<span class="font-code-md text-code-md text-on-surface">0</span>
</div>
<div class="flex items-center justify-between p-md bg-white/5 rounded-lg border border-white/5 hover:border-primary/30 transition-colors duration-250">
<span class="font-code-md text-code-md text-primary">z</span>
<span class="font-code-md text-code-md text-on-surface">0</span>
</div>
</div>
<!-- Action Footer -->
<div class="mt-xl flex gap-sm">
<button class="flex-grow bg-primary-container text-on-primary-container font-label-caps text-label-caps py-md rounded-lg active:scale-95 transition-all duration-250 flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[18px]" data-icon="bolt">bolt</span>
                        READ
                    </button>
<button class="flex-grow border border-white/10 text-primary font-label-caps text-label-caps py-md rounded-lg hover:bg-white/5 active:scale-95 transition-all duration-250 flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
                        WRITE
                    </button>
</div>
</div>
<!-- Technical Detail Overlay (Decoration) -->
<div class="px-lg pb-md flex justify-between items-center opacity-30">
<span class="font-code-sm text-code-sm text-on-surface-variant">ID: 0x8F4A2</span>
<span class="font-code-sm text-code-sm text-on-surface-variant">LNT: 14ms</span>
</div>
</div>
</main>
<!-- Bottom Simulation Control Shell -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex gap-xl items-center bg-surface-container-lowest/80 backdrop-blur-lg border border-white/20 rounded-full px-xl py-sm shadow-xl">
<button class="text-outline hover:text-secondary transition-transform duration-250 active:scale-90">
<span class="material-symbols-outlined text-headline-md" data-icon="fast_rewind">fast_rewind</span>
</button>
<button class="text-secondary-fixed scale-110 active:scale-90 transition-transform duration-250">
<span class="material-symbols-outlined text-headline-md" data-icon="pause">pause</span>
</button>
<button class="text-outline hover:text-secondary transition-transform duration-250 active:scale-90">
<span class="material-symbols-outlined text-headline-md" data-icon="fast_forward">fast_forward</span>
</button>
<div class="w-px h-6 bg-white/10"></div>
<button class="text-outline hover:text-secondary transition-transform duration-250 active:scale-90">
<span class="material-symbols-outlined text-headline-md" data-icon="restart_alt">restart_alt</span>
</button>
</nav>
