<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Consistencia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1 class="title">Simulador de Consistencia</h1>
      </div>
      <div class="header-right">
        <label class="model-label">
          Modelo:
          <select id="model-select" class="model-select">
            <option value="eventual">Eventual</option>
            <option value="sequential">Sequential</option>
            <option value="causal">Causal</option>
            <option value="strict">Strict</option>
          </select>
        </label>
        <div class="op-badge">Ops: <span id="op-count">0</span></div>
      </div>
    </header>

    <section class="replicas-section">
      <div id="replicas-grid" class="replicas-grid"></div>
    </section>

    <section class="ops-panel">
      <div class="op-row">
        <div class="op-group">
          <label class="op-label">Write</label>
          <div class="op-inputs">
            <input type="text" id="write-var" class="input" placeholder="x" maxlength="1">
            <span class="op-eq">=</span>
            <input type="number" id="write-value" class="input input-number" placeholder="42">
            <span class="op-at">@</span>
            <select id="write-replica" class="input input-select">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
            <button id="btn-write" class="btn btn-primary">Write</button>
          </div>
        </div>
      </div>
      <div class="op-row">
        <div class="op-group">
          <label class="op-label">Read</label>
          <div class="op-inputs">
            <input type="text" id="read-var" class="input" placeholder="x" maxlength="1">
            <span class="op-at">@</span>
            <select id="read-replica" class="input input-select">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
            <button id="btn-read" class="btn btn-secondary">Read</button>
          </div>
        </div>
      </div>
      <div class="op-row op-row-reset">
        <button id="btn-reset" class="btn btn-danger">Reset (R)</button>
      </div>
    </section>

    <section class="log-panel">
      <div class="log-header">
        <h2>Operation Log</h2>
      </div>
      <div id="log-entries" class="log-entries">
        <div class="log-empty">Esperando operaciones...</div>
      </div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
