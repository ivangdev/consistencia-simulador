<!-- System Lab - Observe the Read (Final Step) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observe the Read</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;450&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --surface: #051424;
      --surface-dim: #051424;
      --surface-bright: #2c3a4c;
      --surface-container-lowest: #010f1f;
      --surface-container-low: #0d1c2d;
      --surface-container: #122131;
      --surface-container-high: #1c2b3c;
      --surface-container-highest: #273647;
      --on-surface: #d4e4fa;
      --on-surface-variant: #c7c4d7;
      --outline: #908fa0;
      --outline-variant: #464554;
      --primary: #c0c1ff;
      --on-primary: #1000a9;
      --primary-container: #8083ff;
      --on-primary-container: #0d0096;
      --secondary: #5de6ff;
      --secondary-container: #00cbe6;
      --tertiary: #ffb783;
      --tertiary-container: #d97721;
      --error: #ffb4ab;
      --error-container: #93000a;
      --on-error-container: #ffdad6;
      --background: #051424;
      --on-background: #d4e4fa;
      --surface-variant: #273647;
      --primary-fixed: #e1e0ff;
      --primary-fixed-dim: #c0c1ff;
      --secondary-fixed: #a2eeff;
      --secondary-fixed-dim: #2fd9f4;
      --tertiary-fixed: #ffdcc5;
      --tertiary-fixed-dim: #ffb783;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--on-background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--surface-container);
      border-bottom: 1px solid var(--outline-variant);
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title span {
      font-size: 20px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--outline-variant);
      background: transparent;
      color: var(--on-surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .main-content {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .topology-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    .replica-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .replica-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: var(--secondary);
      background: var(--surface-container);
    }
    .replica-circle.read-node {
      border-color: var(--tertiary);
      color: var(--tertiary);
    }
    .replica-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--on-surface-variant);
    }
    .connector {
      font-size: 24px;
      color: var(--primary);
    }
    .info-card {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(12px);
    }
    .info-card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--on-surface);
    }
    .info-card p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--on-surface-variant);
    }
    .info-card strong {
      color: var(--tertiary);
    }
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--surface-container-low);
      border-top: 1px solid var(--outline-variant);
    }
    .nav-btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: 1px solid var(--outline-variant);
      background: transparent;
      color: var(--on-surface-variant);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 250ms ease-in-out;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn:hover {
      background: var(--surface-container-high);
    }
    .nav-btn.primary {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }
    .nav-btn.primary:hover {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">
      <span>database</span>
      <span>Replica B</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn">settings</button>
    </div>
  </header>

  <main class="main-content">
    <div class="topology-section">
      <div class="replica-node">
        <div class="replica-circle">A</div>
        <span class="replica-label">WRITE</span>
      </div>
      <div class="connector">hub</div>
      <div class="replica-node">
        <div class="replica-circle read-node">B</div>
        <span class="replica-label">READ</span>
      </div>
    </div>

    <div class="info-card">
      <h2>menu_book Observe the Read</h2>
      <p>Now Read from <strong>Replica B</strong>. Depending on the consistency model you chose, you might see the new value (42) or the old one. This is how replication lag works!</p>
    </div>
  </main>

  <nav class="nav-bar">
    <button class="nav-btn primary">Finish celebration</button>
  </nav>
</body>
</html>
