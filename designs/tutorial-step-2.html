<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;450&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .spotlight-mask {
            clip-path: polygon(0% 0%, 0% 100%, 5% 100%, 5% 30%, 95% 30%, 95% 55%, 5% 55%, 5% 100%, 100% 100%, 100% 0%);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "on-secondary-container": "#00515d",
                "on-error-container": "#ffdad6",
                "inverse-on-surface": "#233143",
                "surface-tint": "#c0c1ff",
                "primary-fixed-dim": "#c0c1ff",
                "tertiary-fixed-dim": "#ffb783",
                "tertiary": "#ffb783",
                "surface-container-highest": "#273647",
                "primary": "#c0c1ff",
                "surface-container-low": "#0d1c2d",
                "secondary-fixed-dim": "#2fd9f4",
                "on-primary-fixed": "#07006c",
                "primary-container": "#8083ff",
                "outline": "#908fa0",
                "on-background": "#d4e4fa",
                "error-container": "#93000a",
                "surface-dim": "#051424",
                "on-tertiary-container": "#452000",
                "on-secondary-fixed-variant": "#004e5a",
                "on-primary-fixed-variant": "#2f2ebe",
                "tertiary-container": "#d97721",
                "surface-container": "#122131",
                "on-secondary": "#00363e",
                "on-primary-container": "#0d0096",
                "on-tertiary": "#4f2500",
                "on-primary": "#1000a9",
                "on-tertiary-fixed": "#301400",
                "surface-container-lowest": "#010f1f",
                "outline-variant": "#464554",
                "on-secondary-fixed": "#001f25",
                "secondary-container": "#00cbe6",
                "on-tertiary-fixed-variant": "#703700",
                "surface-bright": "#2c3a4c",
                "on-surface-variant": "#c7c4d7",
                "secondary": "#5de6ff",
                "surface": "#051424",
                "surface-variant": "#273647",
                "surface-container-high": "#1c2b3c",
                "inverse-primary": "#494bd6",
                "secondary-fixed": "#a2eeff",
                "tertiary-fixed": "#ffdcc5",
                "on-surface": "#d4e4fa",
                "error": "#ffb4ab",
                "inverse-surface": "#d4e4fa",
                "on-error": "#690005",
                "primary-fixed": "#e1e0ff",
                "background": "#051424"
              },
              "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
              },
              "spacing": {
                "xs": "4px",
                "xl": "32px",
                "sm": "8px",
                "gutter": "20px",
                "base": "4px",
                "md": "16px",
                "xxl": "48px",
                "margin-mobile": "16px",
                "lg": "24px",
                "margin-desktop": "40px"
              },
              "fontFamily": {
                "body-sm": ["Inter"],
                "headline-md": ["Inter"],
                "display": ["Inter"],
                "label-caps": ["Inter"],
                "body-lg": ["Inter"],
                "body-md": ["Inter"],
                "code-sm": ["JetBrains Mono"],
                "code-md": ["JetBrains Mono"],
                "headline-lg": ["Inter"]
              },
              "fontSize": {
                "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "code-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                "code-md": ["14px", {"lineHeight": "1.5", "fontWeight": "450"}],
                "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- Background Layer (Blurred Dashboard) -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-surface-dim to-background opacity-90"></div>
<div class="grid grid-cols-2 gap-4 p-md opacity-40 blur-sm">
<div class="h-32 rounded-xl bg-surface-container-high border border-white/5 p-sm flex flex-col justify-between">
<div class="w-1/2 h-2 bg-outline/20 rounded"></div>
<div class="w-full h-12 bg-primary/10 rounded-lg"></div>
</div>
<div class="h-32 rounded-xl bg-surface-container-high border border-white/5 p-sm">
<div class="flex gap-2">
<div class="w-4 h-4 rounded-full bg-secondary"></div>
<div class="w-12 h-4 bg-outline/20 rounded"></div>
</div>
</div>
<div class="col-span-2 h-48 rounded-xl bg-surface-container-high border border-white/5 p-sm relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-secondary to-transparent"></div>
</div>
</div>
</div>
<!-- Spotlight Overlay -->
<div class="fixed inset-0 z-10 bg-black/60 spotlight-mask backdrop-blur-sm"></div>
<!-- Spotlight Highlight Border -->
<div class="fixed top-[30%] left-[5%] right-[5%] h-[25%] z-20 border-2 border-secondary shadow-[0_0_20px_rgba(93,230,255,0.3)] rounded-xl pointer-events-none flex items-center justify-around p-md">
<!-- Node A -->
<div class="flex flex-col items-center gap-sm">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest border border-secondary/50 flex items-center justify-center shadow-[0_0_15px_rgba(93,230,255,0.1)]">
<span class="font-code-md text-code-md text-secondary">A</span>
</div>
<div class="flex gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-secondary/30"></div>
</div>
</div>
<!-- Node B -->
<div class="flex flex-col items-center gap-sm scale-110">
<div class="w-12 h-12 rounded-lg bg-secondary/20 border border-secondary flex items-center justify-center shadow-[0_0_25px_rgba(93,230,255,0.4)]">
<span class="font-code-md text-code-md text-secondary">B</span>
</div>
<div class="flex gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
</div>
</div>
<!-- Node C -->
<div class="flex flex-col items-center gap-sm">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest border border-secondary/50 flex items-center justify-center shadow-[0_0_15px_rgba(93,230,255,0.1)]">
<span class="font-code-md text-code-md text-secondary">C</span>
</div>
<div class="flex gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-secondary/30"></div>
</div>
</div>
</div>
<!-- Tutorial Modal Content -->
<div class="fixed bottom-0 left-0 right-0 z-30 p-lg">
<div class="glass-panel backdrop-blur-xl bg-surface-container-lowest/80 rounded-xxl p-lg shadow-2xl border-t border-white/20">
<!-- Progress Indicator -->
<div class="flex justify-between items-center mb-lg">
<span class="font-label-caps text-label-caps text-secondary tracking-widest">PASO 2 DE 6</span>
<div class="flex gap-1">
<div class="w-8 h-1 rounded-full bg-secondary/20"></div>
<div class="w-8 h-1 rounded-full bg-secondary shadow-[0_0_8px_#5de6ff]"></div>
<div class="w-8 h-1 rounded-full bg-secondary/20"></div>
<div class="w-1 h-1 rounded-full bg-secondary/10"></div>
<div class="w-1 h-1 rounded-full bg-secondary/10"></div>
<div class="w-1 h-1 rounded-full bg-secondary/10"></div>
</div>
</div>
<!-- Content -->
<div class="space-y-md mb-xxl">
<h1 class="font-headline-lg text-headline-lg text-on-surface leading-tight">Las Tres Réplicas</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Estas son tus 3 réplicas (A, B, C). Cada una mantiene una copia de los datos. Selecciona una para ver su estado.
                </p>
</div>
<!-- Navigation Actions -->
<div class="flex items-center gap-md">
<button class="flex-1 py-md px-lg rounded-xl font-label-caps text-label-caps text-on-surface-variant hover:bg-white/5 transition-all active:scale-95 border border-white/10">
                    ANTERIOR
                </button>
<button class="flex-1 py-md px-lg rounded-xl font-label-caps text-label-caps text-secondary-fixed bg-secondary-container/20 border border-secondary/30 hover:bg-secondary-container/30 transition-all active:scale-95">
                    SALTAR
                </button>
<button class="flex-[1.5] py-md px-lg rounded-xl font-label-caps text-label-caps bg-gradient-to-r from-primary-container to-secondary-container text-on-primary-container font-bold shadow-[0_0_20px_rgba(128,131,255,0.4)] hover:brightness-110 transition-all active:scale-95 flex items-center justify-center gap-sm">
                    SIGUIENTE
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Decorative Top Bar -->
<div class="fixed top-0 left-0 right-0 z-40 h-14 px-margin-mobile flex items-center justify-between pointer-events-none">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="account_tree">account_tree</span>
<span class="font-display text-headline-md text-primary tracking-tight">System Lab</span>
</div>
<div class="w-10 h-10 rounded-full glass-panel flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</div>
</div>
<!-- Floating System Status (Mockup Background Detail) -->
<div class="fixed top-20 right-4 z-0 opacity-20 transform rotate-1">
<div class="glass-panel p-md rounded-lg w-40">
<div class="flex items-center gap-2 mb-2">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
<span class="font-code-sm text-code-sm text-secondary">LIVE FEED</span>
</div>
<div class="space-y-1">
<div class="h-1 w-full bg-outline/20 rounded"></div>
<div class="h-1 w-3/4 bg-outline/20 rounded"></div>
</div>
</div>
</div>
</body></html>
