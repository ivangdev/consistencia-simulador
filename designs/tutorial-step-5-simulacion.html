<!-- System Lab - Simulación y Observación -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulación y Observación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;450&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --surface: #051424;
      --surface-dim: #051424;
      --surface-bright: #2c3a4c;
      --surface-container-lowest: #010f1f;
      --surface-container-low: #0d1c2d;
      --surface-container: #122131;
      --surface-container-high: #1c2b3c;
      --surface-container-highest: #273647;
      --on-surface: #d4e4fa;
      --on-surface-variant: #c7c4d7;
      --outline: #908fa0;
      --outline-variant: #464554;
      --primary: #c0c1ff;
      --on-primary: #1000a9;
      --primary-container: #8083ff;
      --on-primary-container: #0d0096;
      --secondary: #5de6ff;
      --secondary-container: #00cbe6;
      --tertiary: #ffb783;
      --tertiary-container: #d97721;
      --error: #ffb4ab;
      --error-container: #93000a;
      --on-error-container: #ffdad6;
      --background: #051424;
      --on-background: #d4e4fa;
      --surface-variant: #273647;
      --primary-fixed: #e1e0ff;
      --primary-fixed-dim: #c0c1ff;
      --secondary-fixed: #a2eeff;
      --secondary-fixed-dim: #2fd9f4;
      --tertiary-fixed: #ffdcc5;
      --tertiary-fixed-dim: #ffb783;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--on-background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--surface-container);
      border-bottom: 1px solid var(--outline-variant);
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title span {
      font-size: 20px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--outline-variant);
      background: transparent;
      color: var(--on-surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .main-content {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .controls-card {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      backdrop-filter: blur(12px);
    }
    .sim-node {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface-container-high);
      border-radius: 12px;
      border: 1px solid var(--outline-variant);
    }
    .node-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--secondary);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .node-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .node-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .node-sublabel {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--on-surface-variant);
    }
    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--secondary);
      color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 auto;
    }
    .timer {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      color: var(--on-surface);
    }
    .timer-label {
      font-size: 12px;
      color: var(--on-surface-variant);
      margin-bottom: 4px;
    }
    .speed-control {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .speed-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--on-surface-variant);
    }
    .speed-options {
      display: flex;
      gap: 8px;
    }
    .speed-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--outline-variant);
      background: transparent;
      color: var(--on-surface-variant);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 450;
      cursor: pointer;
      transition: all 250ms ease-in-out;
    }
    .speed-btn.active {
      background: var(--primary-container);
      color: var(--on-primary-container);
      border-color: var(--primary-container);
    }
    .explanation {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(12px);
    }
    .explanation p {
      font-size: 16px;
      line-height: 1.5;
      color: var(--on-surface-variant);
    }
    .action-btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      color: var(--on-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 250ms ease-in-out;
    }
    .action-btn:hover {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 24px;
      background: var(--surface-container-low);
      border-top: 1px solid var(--outline-variant);
    }
    .nav-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--outline-variant);
      background: transparent;
      color: var(--on-surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .nav-btn.active {
      background: var(--primary-container);
      color: var(--on-primary-container);
      border-color: var(--primary-container);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">
      <span>System Lab</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn">⚙️</button>
    </div>
  </header>

  <main class="main-content">
    <div class="section-title">Paso 3 de 4: Configuración de Ejecución</div>
    
    <div class="controls-card">
      <div class="sim-node">
        <div class="node-indicator"></div>
        <div class="node-info">
          <span class="node-label">NODE_01</span>
          <span class="node-sublabel">REPLICA_A - SYNC_STATUS</span>
        </div>
      </div>

      <div style="display: flex; justify-content: center;">
        <button class="play-btn">▶️</button>
      </div>

      <div style="text-align: center;">
        <div class="timer-label">SIMULATING...</div>
        <div class="timer">00:00:00</div>
      </div>

      <div class="speed-control">
        <div class="speed-label">Velocidad de Simulación</div>
        <div class="speed-options">
          <button class="speed-btn active">1x</button>
          <button class="speed-btn">2x</button>
          <button class="speed-btn">5x</button>
        </div>
      </div>
    </div>

    <div class="explanation">
      <p>Presiona PLAY para iniciar la simulación. Observa cómo las réplicas se sincronizan según el modelo seleccionado.</p>
    </div>

    <button class="action-btn">INICIAR SIMULACIÓN</button>
  </main>

  <nav class="nav-bar">
    <button class="nav-btn">⏮️</button>
    <button class="nav-btn">⏸️</button>
    <button class="nav-btn">⏭️</button>
  </nav>
</body>
</html>
